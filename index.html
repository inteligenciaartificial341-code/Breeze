<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BREEZE</title>
<style>
:root{
  --blue-1:#1fb6e6;        /* topo claro do gradiente */
  --blue-2:#0a84c9;        /* base do gradiente */
  --blue-deep:#0769a8;
  --aqua:#2fd0d8;
  --ink:#16384a;
  --ink-soft:#5b7689;
  --line:#e6eef3;
  --bg:#f3f7fa;
  --white:#ffffff;
  --ok:#2bb673;
  --warn:#f5a623;
  --danger:#e6584d;
  --grad:linear-gradient(160deg,#22c0ea 0%,#0a84c9 100%);
  --grad-cta:linear-gradient(90deg,#1fb6e6 0%,#2fd0d8 100%);
  --shadow:0 8px 24px rgba(14,80,120,.12);
  --shadow-sm:0 3px 10px rgba(14,80,120,.08);
  --radius:18px;
  --radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0d2b3d;color:var(--ink);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
/* Phone frame */
#phone{
  position:relative;width:100%;max-width:430px;height:100vh;max-height:932px;
  background:var(--bg);overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.4);
}
@media(min-width:480px){#phone{border-radius:0}}

/* status bar (fake) */
.statusbar{
  height:env(safe-area-inset-top,0);min-height:0;
}

/* Screens */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;position:absolute;inset:0;background:var(--bg)}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ===== Gradient header used in client home / forms ===== */
.ghead{
  background:var(--grad);color:#fff;padding:54px 22px 26px;position:relative;overflow:hidden;
}
.ghead .flake{position:absolute;opacity:.18;color:#fff}
.ghead h1{font-size:25px;font-weight:700;line-height:1.2;letter-spacing:-.3px}
.ghead p{font-size:14px;opacity:.92;margin-top:4px}

/* location pill */
.locpill{
  margin-top:18px;background:rgba(255,255,255,.96);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;gap:10px;color:var(--ink);
  font-size:14.5px;font-weight:500;box-shadow:var(--shadow-sm)
}
.locpill svg{flex:none}
.cta-big{
  margin-top:12px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.55);
  color:#fff;border-radius:14px;padding:16px;width:100%;font-size:15px;font-weight:700;
  letter-spacing:.3px;cursor:pointer;backdrop-filter:blur(4px)
}
.cta-big:active{transform:scale(.985)}

/* ===== Service grid ===== */
.section-pad{padding:18px 18px 8px}
.section-title{font-size:17px;font-weight:700;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
.section-title a{font-size:13px;color:var(--blue-2);font-weight:600;text-decoration:none}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px 18px 4px}
.scard{
  background:#fff;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;
  box-shadow:var(--shadow-sm);border:1.5px solid transparent;transition:.15s
}
.scard:active{transform:scale(.96)}
.scard.sel{border-color:var(--blue-1);background:#eafaff}
.scard .ic{width:46px;height:46px;margin:0 auto 8px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#e7f7fd,#d4eefb)}
.scard .ic svg{width:26px;height:26px;color:var(--blue-2)}
.scard span{font-size:12px;font-weight:600;color:var(--ink);line-height:1.25;display:block}
.dots{display:flex;gap:6px;justify-content:center;padding:10px}
.dots i{width:7px;height:7px;border-radius:50%;background:#cfe0ea}
.dots i.on{background:var(--blue-1);width:18px;border-radius:4px}

/* suggestion cards */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:8px 18px 18px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.sug{min-width:165px;border-radius:16px;padding:16px;color:#fff;background:var(--grad);box-shadow:var(--shadow-sm)}
.sug.alt{background:linear-gradient(160deg,#2fd0d8,#1aa6bf)}
.sug b{font-size:15px;display:block}
.sug small{font-size:12px;opacity:.92}

/* tech avatars row */
.techrow{display:flex;gap:14px;overflow-x:auto;padding:12px 18px 6px;scrollbar-width:none}
.techrow::-webkit-scrollbar{display:none}
.techav{text-align:center;min-width:64px}
.techav img,.techav .ph{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid #fff;box-shadow:var(--shadow-sm);background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px}
.techav span{font-size:11px;color:var(--ink-soft);display:block;margin-top:5px;line-height:1.2}

/* ===== Bottom tab bar ===== */
.tabbar{
  display:flex;background:#fff;border-top:1px solid var(--line);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0));flex:none
}
.tab{flex:1;text-align:center;color:#9fb3c0;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none}
.tab svg{width:23px;height:23px;display:block;margin:0 auto 3px}
.tab.on{color:var(--blue-2)}

/* ===== Generic page header (white) ===== */
.phead{display:flex;align-items:center;gap:12px;padding:50px 18px 14px;background:#fff;border-bottom:1px solid var(--line)}
.phead.grad{background:var(--grad);color:#fff;border:none}
.phead .back{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.04);cursor:pointer;border:none}
.phead.grad .back{background:rgba(255,255,255,.2)}
.phead h2{font-size:20px;font-weight:700;flex:1}

/* ===== Forms ===== */
.fgroup{padding:8px 18px}
.flabel{font-size:16px;font-weight:700;margin:14px 0 10px;color:var(--ink)}
.field{
  background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;
  display:flex;align-items:center;gap:11px;margin-bottom:11px;font-size:14.5px;color:var(--ink)
}
.field svg{color:var(--blue-2);flex:none}
.field input,.field select,.field textarea{
  border:none;outline:none;font-size:14.5px;width:100%;font-family:inherit;color:var(--ink);background:none
}
.field textarea{resize:none;min-height:46px}
.field .sub{font-size:12px;color:var(--ink-soft)}
.field.col{flex-direction:column;align-items:stretch;gap:3px}
.row2{display:flex;gap:11px}
.row2>*{flex:1}
.chiprow{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px}
.chip{padding:9px 15px;border-radius:20px;font-size:13px;font-weight:600;background:#eef5f9;color:var(--ink-soft);cursor:pointer;border:1.5px solid transparent}
.chip.on{background:var(--blue-1);color:#fff}

/* price box */
.pricebox{margin:6px 18px 0;background:var(--grad);border-radius:14px;padding:16px 18px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.pricebox b{font-size:21px}

/* CTA button */
.btn{
  display:block;width:calc(100% - 36px);margin:14px 18px;background:var(--grad-cta);color:#fff;
  border:none;border-radius:14px;padding:17px;font-size:15.5px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 16px rgba(31,182,230,.35);font-family:inherit
}
.btn:active{transform:scale(.99)}
.btn.gray{background:#dfe7ec;color:#7d909c;box-shadow:none}
.btn.solid{background:var(--blue-2);box-shadow:none}
.btn.danger-outline{background:#fff;border:1.5px solid var(--danger);color:var(--danger);box-shadow:none}
.btn-row{display:flex;gap:11px;padding:0 18px}
.btn-row .btn{margin:14px 0;width:100%}

/* ===== Map screen (client tracking / provider route) ===== */
.mapwrap{flex:1;position:relative;overflow:hidden;background:#dCEbef}
#mapcanvas{position:absolute;inset:0;width:100%;height:100%}
.map-top{position:absolute;top:0;left:0;right:0;padding:50px 16px 14px 64px;background:linear-gradient(180deg,rgba(10,132,201,.92),transparent);color:#fff;z-index:5}
.map-top .eta{font-size:13px;opacity:.95}
.map-top .eta b{font-size:16px}
.map-top svg{width:26px;height:26px;flex:none}
.req-line svg{width:22px;height:22px}
.statusline svg{width:18px;height:18px}
.driver .acts svg{width:20px;height:20px}

.map-back{position:absolute;top:50px;left:14px;z-index:6;width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);cursor:pointer;border:none}
/* driver sheet */
.sheet{
  position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;
  box-shadow:0 -6px 24px rgba(0,0,0,.14);padding:8px 18px calc(18px + env(safe-area-inset-bottom,0));z-index:8
}
.sheet .grab{width:38px;height:4px;background:#dce5eb;border-radius:2px;margin:6px auto 12px}
.sheet h3{font-size:16px;font-weight:700;text-align:center;margin-bottom:14px}
.driver{display:flex;align-items:center;gap:13px;background:#f5fafd;border-radius:14px;padding:12px;margin-bottom:12px}
.driver .av{width:54px;height:54px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;flex:none}
.driver .info{flex:1}
.driver .info b{font-size:15.5px}
.driver .info .stars{color:var(--warn);font-size:13px;margin-top:1px}
.driver .info small{color:var(--ink-soft);font-size:12px;display:block}
.driver .acts{display:flex;gap:9px}
.driver .acts button{width:42px;height:42px;border-radius:50%;border:none;background:#e7f5fc;color:var(--blue-2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.statusline{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;justify-content:center}
.statusline b{color:var(--blue-2)}

/* ===== Timeline ===== */
.timeline{padding:8px 24px}
.tl{display:flex;gap:14px;position:relative;padding-bottom:26px}
.tl:last-child{padding-bottom:0}
.tl .node{width:26px;height:26px;border-radius:50%;background:#dfe7ec;display:flex;align-items:center;justify-content:center;flex:none;z-index:2}
.tl .node svg{width:15px;height:15px;color:#fff}
.tl.done .node{background:var(--ok)}
.tl.active .node{background:var(--blue-1);box-shadow:0 0 0 5px rgba(31,182,230,.18)}
.tl::before{content:'';position:absolute;left:12px;top:26px;bottom:0;width:2px;background:#e2eaef}
.tl:last-child::before{display:none}
.tl.done::before{background:var(--ok)}
.tl .txt b{font-size:15px;display:block;color:var(--ink)}
.tl .txt small{font-size:12.5px;color:var(--ink-soft)}
.tl.pending .txt b{color:#aab9c3}

/* ===== Provider: incoming request ===== */
.req-screen{background:linear-gradient(160deg,#22c0ea,#0a84c9);flex:1;display:flex;flex-direction:column;padding:54px 20px 24px;color:#fff;position:absolute;inset:0;z-index:40;display:none}
.req-screen.active{display:flex}
.req-screen h1{font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px;line-height:1.15}
.bell{animation:ring 1s infinite}
@keyframes ring{0%,100%{transform:rotate(0)}20%{transform:rotate(14deg)}40%{transform:rotate(-12deg)}60%{transform:rotate(8deg)}80%{transform:rotate(-5deg)}}
.req-card{background:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-top:22px;color:var(--ink);box-shadow:var(--shadow)}
.req-card .snow{width:80px;height:80px;margin:0 auto 14px;border-radius:50%;border:2.5px solid var(--blue-1);display:flex;align-items:center;justify-content:center}
.req-card .snow svg{width:44px;height:44px;color:var(--blue-1)}
.req-card .ttl{font-size:12px;color:var(--ink-soft);letter-spacing:1px;font-weight:600}
.req-card .sv{font-size:19px;font-weight:800;margin-top:4px;line-height:1.2}
.req-info{display:flex;gap:11px;margin-top:14px}
.req-info .box{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;color:var(--ink);box-shadow:var(--shadow-sm)}
.req-info .box svg{color:var(--blue-2);width:22px;height:22px}
.req-info .box small{font-size:10.5px;color:var(--ink-soft);display:block;margin:5px 0 2px;font-weight:600}
.req-info .box b{font-size:13.5px}
.req-line{background:#fff;border-radius:14px;padding:15px;margin-top:12px;color:var(--ink);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:10px;font-size:13.5px}
.req-line svg{color:var(--blue-2);flex:none}
.req-actions{margin-top:auto;display:flex;gap:12px;padding-top:18px}
.req-actions button{flex:1;border:none;border-radius:14px;padding:17px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.req-actions .refuse{background:rgba(255,255,255,.25);color:#fff}
.req-actions .accept{background:#fff;color:var(--blue-2);display:flex;align-items:center;justify-content:center;gap:7px}
.req-timer{text-align:center;margin-top:14px;font-size:13px;opacity:.9}

/* ===== Cards / list items ===== */
.card{background:#fff;border-radius:16px;padding:15px;margin:0 18px 13px;box-shadow:var(--shadow-sm)}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card h4{font-size:15.5px;font-weight:700}
.card .meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.5}
.badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
.badge.green{background:#e3f7ee;color:var(--ok)}
.badge.blue{background:#e2f1fb;color:var(--blue-2)}
.badge.amber{background:#fdf0d9;color:#c98a16}
.badge.gray{background:#eef2f5;color:#8497a3}
.badge.red{background:#fde8e6;color:var(--danger)}

/* ===== Chat ===== */
.chat-head{background:#fff;padding:50px 16px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.chat-card{background:#fff;border-radius:14px;padding:14px;margin:14px 16px 6px;box-shadow:var(--shadow-sm)}
.chat-card .r{display:flex;align-items:center;gap:11px}
.chat-card .av{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.chat-card hr{border:none;border-top:1px solid var(--line);margin:11px 0}
.chat-card .sv{font-size:13.5px;color:var(--ink)}
.chat-card .st{font-size:13px;color:var(--blue-2);font-weight:600;margin-top:5px}
.msgs{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:4px}
.msg{max-width:76%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.35}
.msg.them{background:#fff;align-self:flex-start;border-bottom-left-radius:5px;box-shadow:var(--shadow-sm)}
.msg.me{background:var(--blue-1);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.msg .t{font-size:10px;opacity:.6;margin-top:3px;display:block}
.quick{display:flex;gap:18px;justify-content:space-around;padding:10px 16px;background:#fff;border-top:1px solid var(--line)}
.quick button{background:none;border:none;color:var(--blue-2);font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.chat-input{display:flex;gap:10px;padding:10px 16px calc(12px + env(safe-area-inset-bottom,0));background:#fff;align-items:center}
.chat-input input{flex:1;border:1.5px solid var(--line);border-radius:22px;padding:12px 16px;font-size:14px;outline:none;font-family:inherit}
.chat-input button{width:44px;height:44px;border-radius:50%;background:var(--grad-cta);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}

/* ===== Photo capture ===== */
.photo-zone{margin:14px 18px;border:2px dashed var(--blue-1);border-radius:18px;background:linear-gradient(160deg,#eafaff,#e6f7f2);padding:26px 18px;text-align:center}
.photo-zone .cam{width:60px;height:60px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:var(--shadow-sm)}
.photo-zone .cam svg{width:30px;height:30px;color:var(--blue-2)}
.photo-zone .opts{display:flex;gap:20px;justify-content:center;margin-top:8px}
.photo-zone .opts button{background:none;border:none;color:var(--blue-2);font-size:12.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer}
.photo-zone .opts .circ{width:48px;height:48px;border-radius:50%;background:var(--blue-1);color:#fff;display:flex;align-items:center;justify-content:center}
.thumbs{display:flex;gap:11px;padding:6px 18px;overflow-x:auto}
.thumb{position:relative;width:96px;height:96px;border-radius:14px;background:#dfeaf0 center/cover;flex:none;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:var(--blue-2);font-size:34px}
.thumb .x{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--danger);color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px}

/* ===== Materials marketplace ===== */
.store{background:#fff;border-radius:16px;margin:0 18px 13px;box-shadow:var(--shadow-sm);overflow:hidden}
.store .sh{display:flex;align-items:center;gap:12px;padding:14px}
.store .logo{width:46px;height:46px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.store .sh b{font-size:15px}
.store .sh small{font-size:12px;color:var(--ink-soft)}
.prod{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--line)}
.prod .pic{width:44px;height:44px;border-radius:10px;background:#eef5f9;display:flex;align-items:center;justify-content:center;color:var(--blue-2);flex:none}
.prod .nm{flex:1}
.prod .nm b{font-size:13.5px;font-weight:600}
.prod .nm small{font-size:11.5px;color:var(--ink-soft);display:block}
.prod .price{text-align:right}
.prod .price b{font-size:14px;color:var(--ink)}
.prod .price .disc{font-size:10.5px;color:var(--ok);font-weight:700;display:block}
.qty{display:flex;align-items:center;gap:10px}
.qty button{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:#fff;color:var(--blue-2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty span{min-width:18px;text-align:center;font-weight:700;font-size:14px}
.cartbar{position:absolute;left:0;right:0;bottom:0;background:#fff;padding:14px 18px calc(14px + env(safe-area-inset-bottom,0));box-shadow:0 -4px 18px rgba(0,0,0,.1);display:flex;align-items:center;gap:14px;z-index:10}
.cartbar .tot small{font-size:11px;color:var(--ink-soft);display:block}
.cartbar .tot b{font-size:19px}
.cartbar .btn{margin:0;flex:1;width:auto}

/* cost control */
.cost{background:#fff;border-radius:16px;margin:14px 18px;box-shadow:var(--shadow-sm);overflow:hidden}
.cost .h{padding:16px;background:var(--grad);color:#fff}
.cost .h b{font-size:16px}
.cost .h small{opacity:.9;font-size:12.5px}
.cost .row{display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
.cost .row:last-child{border:none}
.cost .row .v{font-weight:700}
.cost .row.total{background:#f5fafd}
.cost .row.total .v{color:var(--ok);font-size:17px}
.bar{height:9px;border-radius:5px;background:#eef2f5;margin:4px 16px 14px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--grad-cta);border-radius:5px}

/* ===== Login ===== */
#login{background:var(--grad);color:#fff;justify-content:center;align-items:center;text-align:center;padding:30px}
#login .logo{width:120px;height:120px;margin:0 auto 18px}
#login h1{font-size:46px;font-weight:200;letter-spacing:14px;margin-bottom:6px}
#login p{font-size:14.5px;opacity:.92;margin-bottom:40px;font-weight:300;letter-spacing:.5px}
.gbtn{background:#fff;color:#3c4043;border:none;border-radius:14px;padding:15px;width:100%;max-width:320px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:11px;cursor:pointer;margin-bottom:13px;box-shadow:var(--shadow)}
.role-pick{display:flex;gap:12px;width:100%;max-width:320px;margin-top:8px}
.role-pick button{flex:1;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:14px;padding:15px 8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.role-pick button:active{background:rgba(255,255,255,.28)}
#login .small{font-size:12.5px;opacity:.8;margin-top:24px;max-width:300px;line-height:1.5}

/* avatar in header */
.av-sm{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;border:2px solid rgba(255,255,255,.6)}

/* toast */
#toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:30px;font-size:13.5px;font-weight:600;opacity:0;transition:.3s;z-index:200;pointer-events:none;max-width:90%;text-align:center;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* permission modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,40,60,.55);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:26px 22px calc(26px + env(safe-area-inset-bottom,0));text-align:center;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal .pic{width:70px;height:70px;border-radius:50%;background:linear-gradient(160deg,#e7f7fd,#d4eefb);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.modal .pic svg{width:36px;height:36px;color:var(--blue-2)}
.modal h3{font-size:19px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--ink-soft);line-height:1.5;margin-bottom:20px}
.modal .btn{width:100%;margin:0 0 10px}
.modal .deny{background:none;border:none;color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;padding:8px}

/* rating */
.rate-av{width:96px;height:96px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:700;margin:18px auto 10px;border:3px solid #fff;box-shadow:var(--shadow)}
.stars-big{display:flex;gap:10px;justify-content:center;margin:14px 0}
.stars-big svg{width:38px;height:38px;color:#dfe7ec;cursor:pointer;transition:.1s}
.stars-big svg.on{color:var(--warn)}
.tagrate{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:0 18px}
.tagrate .t{padding:11px 16px;border-radius:14px;background:#f1f7fa;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;gap:7px;border:1.5px solid transparent}
.tagrate .t.on{background:#e2f1fb;color:var(--blue-2);border-color:var(--blue-1)}

.empty{text-align:center;padding:60px 30px;color:var(--ink-soft)}
.empty svg{width:70px;height:70px;color:#cfe0ea;margin-bottom:14px}
.empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}
.empty small{font-size:13.5px;line-height:1.5}

.earn{background:#fff;border-top:1px solid var(--line);padding:14px 18px calc(8px + env(safe-area-inset-bottom,0));display:flex;justify-content:space-between;align-items:center;flex:none}
.earn small{font-size:12px;color:var(--ink-soft)}
.earn b{font-size:22px;color:var(--ink)}
.switch{width:48px;height:28px;border-radius:14px;background:var(--ok);position:relative;cursor:pointer}
.switch::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;right:3px;transition:.2s}
.switch.off{background:#cfd9e0}
.switch.off::after{right:23px}
</style>
</head>

/* ---------- Toast ---------- */
let toastT;

/* ---------- Permission modal ---------- */
function askPermission(type, title, body, onGrant){
  if(S.perms[type]){onGrant&&onGrant();return}
  const icons={location:I.pin,camera:I.cam,notif:'<div style="color:var(--blue-2)">'+I.bell+'</div>'};
  $('#modal').innerHTML=`
    <div class="pic">${icons[type]||I.pin}</div>
    <h3>${title}</h3>
    <p>${body}</p>
    <button class="btn" id="permOk">Permitir</button>
    <button class="deny" id="permNo">Agora não</button>`;
  $('#modalbg').classList.add('show');
  $('#permOk').onclick=()=>{S.perms[type]=true;save();$('#modalbg').classList.remove('show');toast('Permissão concedida ✓');onGrant&&onGrant()};
  $('#permNo').onclick=()=>{$('#modalbg').classList.remove('show');toast('Você pode permitir depois nas configurações')};
}

/* ---------- Router ---------- */
let SCREEN='login';
function go(name, data){SCREEN=name; render(data); PHONE.scrollTop=0;}

/* ---------- Render dispatcher ---------- */
function render(data){
  const views={
    login:viewLogin,
    clientHome:viewClientHome,
    request:viewRequest,
    equipment:viewEquipment,
    tracking:viewTracking,
    chat:viewChat,
    status:viewStatus,
    rate:viewRate,
    clientOrders:viewClientOrders,
    profile:viewProfile,
    providerHome:viewProviderHome,
    incoming:viewIncoming,
    providerJob:viewProviderJob,
    photos:viewPhotos,
    materials:viewMaterials,
    cost:viewCost,
    schedule:viewSchedule,
  };
  PHONE.innerHTML = (views[SCREEN]||viewLogin)(data);
  bind();
}

/* attach listeners declared via data-go / data-act */
function bind(){
  $$('[data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go));
  $$('[data-act]').forEach(el=>el.onclick=()=>ACT[el.dataset.act]&&ACT[el.dataset.act](el));
}

  const svc = SERVICES.find(s=>s.id===sel);
  return `<div class="screen active">

function viewStatus(){

function cartTotals(){
  let count=0,total=0;
  allProducts().forEach(p=>{const q=S.cart[p.id]||0;count+=q;total+=q*p.price*(1-p.disc/100)});

/* ---------- extend bind for dynamic selectors ---------- */
const _bind=bind;

  $$('#svcGrid .scard').forEach(c=>c.onclick=()=>{S.draft={svc:c.dataset.svc};save();go('request')});

  $$('[data-plus]').forEach(b=>b.onclick=()=>changeQty(b.dataset.plus,1));
  $$('[data-minus]').forEach(b=>b.onclick=()=>changeQty(b.dataset.minus,-1));

  if(SCREEN==='tracking') startMap();

  if(SCREEN==='incoming') startReqTimer();

function changeQty(id,d){
  S.cart[id]=Math.max(0,(S.cart[id]||0)+d); save();
  const q=$('#q-'+id); if(q)q.textContent=S.cart[id];
  const {count,total}=cartTotals();
  const bar=$('.cartbar'); if(bar){
    bar.querySelector('.tot small').textContent=`${count} ${count===1?'item':'itens'}`;
    bar.querySelector('.tot b').textContent='R$ '+total.toFixed(2);
    const btn=bar.querySelector('.btn');
    btn.style.opacity=count===0?'.5':'1'; btn.style.pointerEvents=count===0?'none':'auto';
  }

/* ---------- incoming request timer ---------- */
let reqInt;
function startReqTimer(){
  clearInterval(reqInt); let t=14;
  reqInt=setInterval(()=>{
    t--; const el=$('#reqTimer'); if(el)el.textContent=t;
    if(t<=0){clearInterval(reqInt); if(SCREEN==='incoming'){toast('Pedido expirou');go('providerHome')}}
  },1000);
}

/* ---------- animated map (canvas) ---------- */
let mapRAF;
function startMap(){
  cancelAnimationFrame(mapRAF);
  const cv=$('#mapcanvas'); if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  // route waypoints (L-shaped like the mock)
  const start={x:w*0.78,y:h*0.62}, mid={x:w*0.30,y:h*0.62}, mid2={x:w*0.30,y:h*0.30}, end={x:w*0.80,y:h*0.28};
  const path=[start,mid,mid2,end];
  let prog=0;
  function pointAt(t){
    // piecewise along 3 segments
    const segs=[[path[0],path[1]],[path[1],path[2]],[path[2],path[3]]];
    const seg=Math.min(2,Math.floor(t*3)); const lt=(t*3)-seg;
    const a=segs[seg][0],b=segs[seg][1];
    return {x:a.x+(b.x-a.x)*lt, y:a.y+(b.y-a.y)*lt};
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    // bg gradient
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#cfe8f4'); g.addColorStop(1,'#dcefe6');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    // fake streets
    ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=8;
    for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(0,h*i/6);ctx.lineTo(w,h*i/6+20);ctx.stroke();}
    for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(w*i/5,0);ctx.lineTo(w*i/5-20,h);ctx.stroke();}
    // route line
    ctx.strokeStyle='#0a84c9'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
    path.slice(1).forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
    // end (home) marker
    ctx.fillStyle='#0a84c9'; ctx.beginPath(); ctx.arc(end.x,end.y,9,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('🏠',end.x,end.y+4);
    // moving truck
    const p=pointAt(prog);
    ctx.fillStyle='#1fb6e6'; ctx.beginPath(); ctx.arc(p.x,p.y,15,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='15px sans-serif'; ctx.fillText('🚚',p.x,p.y+5);
    prog+=0.0016; if(prog>1)prog=0;
    mapRAF=requestAnimationFrame(draw);
  }
  draw();
}

/* re-render current screen on resize for map */
window.addEventListener('resize',()=>{if(SCREEN==='tracking')startMap()});

</script>
<script type="module">
/* ===================== BREEZE · Firebase Layer ===================== */
/* Usa Firebase v10 modular via CDN (carregado no index). Exporto helpers
   no escopo global para o app (core/actions) consumir sem bundler. */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, updateDoc, getDoc,
  onSnapshot, query, where, orderBy, serverTimestamp, runTransaction, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8DWAPZJUy0mJRpMG_RXRmh4LYJxM34OQ",
  authDomain: "breeze-8643b.firebaseapp.com",
  projectId: "breeze-8643b",
  storageBucket: "breeze-8643b.firebasestorage.app",
  messagingSenderId: "359221051120",
  appId: "1:359221051120:web:1f5a4d75db871a9e828c35"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

/* expose a small, stable API on window.BZ for the non-module app code */
window.BZ = {
  ready:false,
  user:null,            // {uid, name, email, photo}
  _unsubOrders:null,    // active orders listener

  /* ---- AUTH ---- */
  loginGoogle(){
    const provider = new GoogleAuthProvider();
    return signInWithPopup(auth, provider).catch(err=>{
      // popup blocked / closed -> fall back to anonymous so testing still works
      console.warn('Google login falhou, entrando anônimo:', err.code);
      return signInAnonymously(auth);
    });
  },
  loginAnon(){ return signInAnonymously(auth); },
  logout(){ return signOut(auth); },
  onAuth(cb){
    onAuthStateChanged(auth, u=>{
      if(u){
        window.BZ.user = {
          uid:u.uid,
          name:u.displayName || 'Você',
          email:u.email || '',
          photo:u.photoURL || ''
        };
      } else {
        window.BZ.user = null;
      }
      window.BZ.ready = true;
      cb(window.BZ.user);
    });
  },

  /* ---- ORDERS (realtime) ---- */
  // create a service order; returns the new doc id
  async createOrder(data){
    const ref = await addDoc(collection(db,'service_orders'), {
      ...data,
      clientId: window.BZ.user?.uid || 'anon',
      clientName: window.BZ.user?.name || 'Cliente',
      providerId: null,
      providerName: null,
      status: 'SEARCHING',
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    });
    return ref.id;
  },

  // provider accepts using a transaction (only one wins the race)
  async acceptOrder(orderId){
    const ref = doc(db,'service_orders',orderId);
    return runTransaction(db, async (tx)=>{
      const snap = await tx.get(ref);
      if(!snap.exists()) throw new Error('not-found');
      if(snap.data().status !== 'SEARCHING') throw new Error('taken');
      tx.update(ref,{
        status:'ACCEPTED',
        providerId: window.BZ.user?.uid || 'prov',
        providerName: window.BZ.user?.name || 'Técnico',
        acceptedAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
    });
  },

  async setStatus(orderId, status, extra={}){
    const ref = doc(db,'service_orders',orderId);
    await updateDoc(ref,{ status, ...extra, updatedAt: serverTimestamp() });
  },

  async patchOrder(orderId, patch){
    const ref = doc(db,'service_orders',orderId);
    await updateDoc(ref,{ ...patch, updatedAt: serverTimestamp() });
  },

  async getOrder(orderId){
    const snap = await getDoc(doc(db,'service_orders',orderId));
    return snap.exists() ? {id:snap.id, ...snap.data()} : null;
  },

  // listen to open orders (for providers) OR my orders (for clients)
  watchOrders(role, cb){
    if(window.BZ._unsubOrders){ window.BZ._unsubOrders(); window.BZ._unsubOrders=null; }
    let q;
    const col = collection(db,'service_orders');
    if(role==='provider'){
      // open orders waiting for a provider
      q = query(col, where('status','==','SEARCHING'), orderBy('createdAt','desc'), limit(20));
    } else {
      q = query(col, where('clientId','==', window.BZ.user?.uid||'anon'), orderBy('createdAt','desc'), limit(20));
    }
    window.BZ._unsubOrders = onSnapshot(q, snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      cb(list);
    }, err=>{
      console.warn('watchOrders erro (provável índice faltando):', err.message);
      cb([], err);
    });
  },

  // watch a single order in realtime (both sides use this on tracking/job)
  watchOrder(orderId, cb){
    const ref = doc(db,'service_orders',orderId);
    return onSnapshot(ref, snap=>{
      if(snap.exists()) cb({id:snap.id, ...snap.data()});
    });
  },

  // accepted jobs for a provider (their schedule)
  watchSchedule(cb){
    const col = collection(db,'service_orders');
    const q = query(col, where('providerId','==', window.BZ.user?.uid||'prov'),
                     orderBy('createdAt','desc'), limit(20));
    return onSnapshot(q, snap=>{
      cb(snap.docs.map(d=>({id:d.id, ...d.data()})));
    }, err=>{ console.warn('watchSchedule:', err.message); cb([], err); });
  },
};

/* signal to the app that the Firebase layer finished loading */
window.dispatchEvent(new Event('bz-ready'));

</script>
<script>
/* ===================== BREEZE · Firebase Bridge ===================== */
/* Reescreve boot, login, criação/aceite de pedidos e telas em tempo real
   para usar window.BZ (Firestore). As views continuam lendo de S. */

(function(){
  let bzReady = !!window.BZ;
  if(!bzReady){ window.addEventListener('bz-ready', ()=>{ bzReady=true; boot(); }); }

  // map Firestore status -> app status used by views
  const ST_IN = {SEARCHING:'requested', ACCEPTED:'accepted', IN_PROGRESS:'progress', FINISHED:'finished', CANCELED:'canceled'};
  const ST_OUT = {requested:'SEARCHING', accepted:'ACCEPTED', progress:'IN_PROGRESS', finished:'FINISHED', canceled:'CANCELED'};

  function fsToOrder(o){
    return {
      id:o.id,
      svc:o.serviceType||'install',
      status: ST_IN[o.status]||'requested',
      price:o.price||0,
      date:'Hoje',
      clientName:o.clientName||'Cliente',
      providerName:o.providerName||'Técnico',
      providerPhase:o.providerPhase||'going',
      materialTotal:o.materialTotal||0,
      photoBefore:!!o.photoBefore,
      photoAfter:!!o.photoAfter,
      _raw:o,
    };
  }

  /* ---------- BOOT ---------- */
  function boot(){
    if(!bzReady) return;
    window.BZ.onAuth(user=>{
      if(!user){ go('login'); return; }
      // user logged in; keep local name in sync
      S.user.name = user.name || S.user.name;
      // if a role was chosen previously, route there
      if(S.role==='client'){ subClientOrders(); go('clientHome'); }
      else if(S.role==='provider'){ subProviderOrders(); go('providerHome'); }
      else go('login');
    });
  }

  /* ---------- live subscriptions ---------- */
  function subClientOrders(){
    window.BZ.watchOrders('client', list=>{
      S.orders = list.map(fsToOrder);
      // keep activeOrder fresh
      if(S.activeOrder){
        const found = S.orders.find(o=>o.id===S.activeOrder.id);
        if(found) S.activeOrder = found;
      }
      save();
      if(['clientHome','clientOrders'].includes(SCREEN)) render();
    });
  }
  function subProviderOrders(){
    window.BZ.watchOrders('provider', list=>{
      S.openOrders = list.map(fsToOrder);
      save();
      if(SCREEN==='providerHome') render();
    });
  }

  /* ---------- override boot trigger ---------- */
  document.addEventListener('DOMContentLoaded', ()=>{ if(bzReady) boot(); });
  // if DOM already ready
  if(document.readyState!=='loading' && bzReady) boot();

  /* ===================== OVERRIDE ACTIONS ===================== */
  // wait until ACT exists (actions.js loaded before this file)
  function patchActions(){
    if(typeof ACT==='undefined'){ return setTimeout(patchActions,30); }

    /* --- LOGIN --- */
    ACT.googleLogin = ()=> doLogin('client');
    ACT.loginClient = ()=> doLogin('client');
    ACT.loginProvider = ()=> doLogin('provider');
    function doLogin(role){
      toast('Conectando…');
      window.BZ.loginGoogle().then(()=>{
        S.role=role; save();
        if(role==='client'){ subClientOrders(); go('clientHome'); }
        else { subProviderOrders(); go('providerHome'); }
        toast(role==='client'?'Conectado como cliente ✓':'Conectado como prestador ✓');
      }).catch(e=>{ toast('Não foi possível entrar. Tente de novo.'); console.error(e); });
    }

    ACT.logout = ()=>{
      window.BZ.logout().finally(()=>{ S.role=null; S.activeOrder=null; save(); go('login'); });
    };

    /* --- CLIENT: create order --- */
    ACT.confirmRequest = ()=>{
      askPermission('location','Permitir localização?',
        'O BREEZE usa sua localização para enviar o técnico ao endereço certo e mostrar o trajeto em tempo real.',
        async ()=>{
          const svc=S.draft.svc||'install';
          const price=(SERVICES.find(s=>s.id===svc)||{}).price||0;
          toast('Enviando pedido…');
          try{
            const id = await window.BZ.createOrder({serviceType:svc, price, city:S.user.city});
            S.activeOrder = {id, svc, status:'requested', price, date:'Hoje', providerPhase:'going'};
            save();
            // watch this order so client sees acceptance/status live
            watchActive(id);
            go('tracking'); startMap();
            toast('Pedido criado ✓ Procurando técnico…');
          }catch(e){ console.error(e); toast('Erro ao criar pedido. Tente de novo.'); }
        });
    };

    /* --- PROVIDER: accept open order --- */
    ACT.acceptJob = ()=>{
      askPermission('location','Permitir localização?',
        'Para navegar até o cliente e compartilhar seu trajeto em tempo real, o BREEZE precisa da sua localização.',
        async ()=>{
          const open = S._incoming || (S.openOrders||[])[0];
          if(!open){ toast('Pedido não está mais disponível'); return go('providerHome'); }
          try{
            await window.BZ.acceptOrder(open.id);
            S.activeOrder = {...open, status:'accepted', providerPhase:'going'};
            save(); watchActive(open.id);
            toast('Atendimento aceito ✓'); go('providerJob');
          }catch(e){
            if(e.message==='taken') toast('Este pedido já foi aceito por outro prestador.');
            else { console.error(e); toast('Não foi possível aceitar. Tente de novo.'); }
            go('providerHome');
          }
        });
    };

    /* --- PROVIDER: phases & photos sync to Firestore --- */
    ACT.arrived = async ()=>{
      S.activeOrder.providerPhase='onsite'; save();
      await safePatch({providerPhase:'onsite'});
      toast('Chegada confirmada'); go('providerJob');
    };
    ACT.confirmPhoto = async ()=>{
      const kind=S._photoKind;
      if(kind==='before'){
        S.activeOrder.providerPhase='working'; save();
        await safePatch({providerPhase:'working', photoBefore:true});
        toast('Foto ANTES registrada ✓'); go('providerJob');
      } else {
        S.activeOrder.providerPhase='done'; S.activeOrder.status='finished'; save();
        await safePatch({providerPhase:'done', photoAfter:true, status:'FINISHED', finishedAt:Date.now()});
        toast('Serviço finalizado ✓ Aguardando aprovação do cliente'); go('providerJob');
      }
    };

    /* --- PROVIDER: reserve materials --- */
    const _reserve = ACT.reserveMaterials;
    ACT.reserveMaterials = async ()=>{
      const {total}=cartTotals();
      if(S.activeOrder){ S.activeOrder.materialTotal=total; }
      await safePatch({materialTotal:total});
      S.cart={}; save();
      toast('Materiais reservados ✓ Código: BRZ-4815');
      go('providerJob');
    };

    /* --- CLIENT: submit rating --- */
    const _rate = ACT.submitRating;
    ACT.submitRating = async ()=>{
      if(S.activeOrder){ await safePatch({rated:true}); }
      S.ratingDone=true; save(); toast('Avaliação enviada. Obrigado! ✓');
      setTimeout(()=>go('clientHome'),700);
    };

    async function safePatch(patch){
      try{ if(S.activeOrder?.id) await window.BZ.patchOrder(S.activeOrder.id, patch); }
      catch(e){ console.warn('patch falhou', e.message); }
    }
  }

  /* ---------- watch the active order (both sides) ---------- */
  let _activeUnsub=null;
  function watchActive(id){
    if(_activeUnsub){ _activeUnsub(); _activeUnsub=null; }
    _activeUnsub = window.BZ.watchOrder(id, o=>{
      const mapped = fsToOrder(o);
      S.activeOrder = {...S.activeOrder, ...mapped};
      save();
      // re-render live screens
      if(['tracking','status','providerJob','chat'].includes(SCREEN)) render();
    });
  }

  /* ---------- override provider home to read S.openOrders ---------- */
  // We monkeypatch viewProviderHome to reflect live open orders.
  const origProviderHome = window.viewProviderHome;
  window.viewProviderHome = function(){
    const online=S.providerOnline;
    const open=(S.openOrders||[]);
    let body;
    if(!online){
      body = `<div class="empty">${I.snow}<b>Você está offline</b><small>Ative sua disponibilidade para receber novos pedidos.</small></div>`;
    } else if(open.length===0){
      body = `<div class="empty">${I.list}<b>Nenhum pedido aberto</b><small>Assim que um cliente solicitar um serviço, ele aparece aqui em tempo real.</small></div>`;
    } else {
      body = open.map(o=>{
        const sv=(SERVICES.find(s=>s.id===o.svc)||{}).name||'Serviço';
        return `<div class="card" data-act="openIncoming" data-oid="${o.id}" style="cursor:pointer;border-left:4px solid var(--blue-1)">
          <div class="top"><h4>${sv}</h4><span class="badge amber">Novo</span></div>
          <div class="meta">📍 ${o._raw?.city||'Goiânia, GO'} · agora<br>Cliente: ${o.clientName} · <b style="color:var(--ok)">R$ ${(o.price||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</b></div>
        </div>`;
      }).join('');
    }
    return `<div class="screen active">
      <div class="phead grad" style="flex-direction:column;align-items:stretch;gap:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="av-sm">${(S.user.name||'T')[0]}</div>
          <div style="flex:1"><b style="font-size:18px">Serviços disponíveis</b><div style="font-size:12.5px;opacity:.9">${online?'Recebendo pedidos em tempo real':'Offline'}</div></div>
          <div class="switch ${online?'':'off'}" data-act="toggleOnline"></div>
        </div>
      </div>
      <div class="scroll" style="padding-top:14px">
        <div class="section-pad"><div class="section-title" style="font-size:15px">Pedidos próximos</div></div>
        ${body}
      </div>
      ${tabbar('list','provider')}
    </div>`;
  };

  /* open the incoming full-screen for a specific order id */
  function patchIncoming(){
    if(typeof ACT==='undefined'){ return setTimeout(patchIncoming,30); }
    ACT.openIncoming = (el)=>{
      const oid = el.dataset.oid;
      const o = (S.openOrders||[]).find(x=>x.id===oid);
      if(!o){ toast('Pedido indisponível'); return; }
      S._incoming = o; save(); go('incoming');
    };
  }

  /* override incoming view to show the selected order */
  const origIncoming = window.viewIncoming;
  window.viewIncoming = function(){
    const o = S._incoming || (S.openOrders||[])[0];
    const sv = o ? ((SERVICES.find(s=>s.id===o.svc)||{}).name||'Serviço') : 'Instalação de Ar Condicionado Split';
    const price = o ? (o.price||0) : 350;
    const city = o?._raw?.city || 'Goiânia, GO';
    return `<div class="screen active"><div class="req-screen active">
      <h1><span class="bell">${I.bell}</span> Nova Solicitação de Serviço</h1>
      <div class="req-card">
        <div class="snow">${I.snow}</div>
        <div class="ttl">TIPO DE SERVIÇO</div>
        <div class="sv">${sv}</div>
      </div>
      <div class="req-info">
        <div class="box">${I.map}<small>LOCAL</small><b>${city.split(',')[0]}</b></div>
        <div class="box">${I.clock}<small>TEMPO EST.</small><b>15 min</b></div>
        <div class="box">${I.money}<small>GANHO</small><b>R$ ${price}</b></div>
      </div>
      <div class="req-line">${I.cal}<div><b>Horário solicitado</b><br><span style="color:var(--ink-soft)">Hoje · 14:00 - 16:00</span></div></div>
      <div class="req-line">${I.thermo}<div><b>Cliente</b><br><span style="color:var(--ink-soft)">${o?.clientName||'Cliente'}</span></div></div>
      <div class="req-timer">Toque em aceitar para iniciar</div>
      <div class="req-actions">
        <button class="refuse" data-go="providerHome">Recusar</button>
        <button class="accept" data-act="acceptJob">${I.check} Aceitar</button>
      </div>
    </div></div>`;
  };

  patchActions();
  patchIncoming();
})();

</script>

<script>
/* Safety: if Firebase SDK fails to load (network/adblock), still show login */
setTimeout(function(){
  if(!window.BZ){
    try{
      if(typeof go==='function' && typeof SCREEN!=='undefined' && SCREEN==='login'){
        if(document.getElementById('phone').innerText.trim()===''){ go('login'); }
      }
      if(typeof toast==='function') toast('Sem conexão com o servidor. Verifique a internet.');
    }catch(e){}
  }
}, 6000);
</script>
</body>
</html>
